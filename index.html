<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>London Open Mic Nights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #2a2a2a;
    --border: #333;
    --text: #f0ece4;
    --muted: #999;
    --accent: #e8c547;
    --mon: #e05c5c;
    --tue: #e07a3a;
    --wed: #d4b84a;
    --thu: #5aaa6e;
    --fri: #4a8fd4;
    --sat: #7b64d4;
    --sun: #c45aaa;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    height: 52px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--accent);
    flex: 1;
  }

  h1 em { font-style: italic; }

  .hdr-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    position: relative;
  }

  .hdr-btn:active { transform: scale(0.95); }
  .hdr-btn.on { background: var(--accent); border-color: var(--accent); color: #000; }

  .day-badge {
    position: absolute;
    top: -2px; right: -2px;
    min-width: 20px; height: 20px;
    background: var(--accent);
    color: #000;
    border-radius: 10px;
    font-size: 0.65rem;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  /* ── SEARCH ── */
  .search-bar {
    padding: 5px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 15px 44px 15px 48px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 26px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    pointer-events: none;
    color: var(--muted);
  }

  .search-x {
    position: absolute;
    right: 26px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 6px;
    display: none;
  }

  .search-results {
    position: absolute;
    top: calc(100% - 1px);
    left: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    z-index: 500;
    display: none;
    overflow: hidden;
    max-height: 50vh;
    overflow-y: auto;
  }

  .s-item {
    padding: 18px 20px;
    font-size: 1rem;
    cursor: pointer;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .s-item:active { background: var(--surface2); }

  .s-item-name { flex: 1; }
  .s-item-loc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  .s-day-pill {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 12px;
    color: #fff;
    flex-shrink: 0;
  }

  /* ── MAP ── */
  #map { flex: 1; }

  /* ── FILTER DRAWER (bottom sheet) ── */
  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .drawer-backdrop.show { display: block; opacity: 1; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(320px, 85vw);
    background: var(--surface);
    border-radius: 20px 0 0 20px;
    z-index: 1001;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  .drawer.show { transform: translateX(0); }

  .drawer-handle { display: none; }

  .drawer-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 20px 16px;
  }

  .day-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0 16px 16px;
  }

  .drawer-close-row {
    display: flex;
    justify-content: flex-end;
    padding: 16px 16px 8px;
  }

  .drawer-close-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 36px; height: 36px;
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 16px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text);
    border: 1.5px solid transparent;
    margin-bottom: 6px;
  }

  .day-item:active { background: var(--surface2); }

  .day-item.active {
    border-color: transparent;
    color: #fff;
  }

  .day-item[data-day="ALL"].active { background: var(--accent); color: #000; }
  .day-item[data-day="MONDAY"].active    { background: var(--mon); }
  .day-item[data-day="TUESDAY"].active   { background: var(--tue); }
  .day-item[data-day="WEDNESDAY"].active { background: var(--wed); color: #222; }
  .day-item[data-day="THURSDAY"].active  { background: var(--thu); }
  .day-item[data-day="FRIDAY"].active    { background: var(--fri); }
  .day-item[data-day="SATURDAY"].active  { background: var(--sat); }
  .day-item[data-day="SUNDAY"].active    { background: var(--sun); }

  .day-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .day-count {
    margin-left: auto;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 400;
  }

  .day-item.active .day-count { color: rgba(255,255,255,0.7); }
  .day-item[data-day="ALL"].active .day-count { color: rgba(0,0,0,0.5); }
  .day-item[data-day="WEDNESDAY"].active .day-count { color: rgba(0,0,0,0.5); }

  /* ── POPUPS ── */
  .leaflet-popup-content-wrapper {
    background: #fff;
    color: #222;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    padding: 0;
    overflow: hidden;
  }

  .leaflet-popup-content { margin: 0; min-width: 250px; max-width: 300px; }
  .leaflet-popup-tip { background: #fff; }
  .leaflet-popup-close-button {
    color: #aaa !important;
    top: 12px !important;
    right: 12px !important;
    font-size: 22px !important;
    width: 32px !important;
    height: 32px !important;
  }

  .p-header { padding: 16px 18px 12px; border-bottom: 1px solid #f0f0f0; }

  .p-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    color: #fff;
  }

  .p-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    line-height: 1.2;
    color: #111;
  }

  .p-body { padding: 12px 18px 4px; display: flex; flex-direction: column; gap: 9px; }

  .p-row { display: flex; gap: 10px; align-items: flex-start; font-size: 0.92rem; line-height: 1.5; color: #333; }
  .p-icon { flex-shrink: 0; width: 18px; text-align: center; }

  .p-maps {
    display: block;
    margin: 14px 18px 18px;
    padding: 15px;
    background: var(--accent);
    color: #000;
    text-align: center;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 24px;
  }

  #loading h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--accent); }
  #loading p { color: var(--muted); font-size: 1rem; }
  .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top: 3px solid var(--accent); }

  /* ── LOCATION ── */
  .loc-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4285f4;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 3px rgba(66,133,244,0.35);
    animation: loc-pulse 2s infinite;
  }

  @keyframes loc-pulse {
    0%   { box-shadow: 0 0 0 3px rgba(66,133,244,0.35); }
    50%  { box-shadow: 0 0 0 10px rgba(66,133,244,0.05); }
    100% { box-shadow: 0 0 0 3px rgba(66,133,244,0.35); }
  }

  /* ── MARKER (teardrop) ── */
  .m-pin {
    width: 24px;
    height: 24px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2.5px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    position: relative;
  }
  .m-pin::after {
    content: '';
    width: 8px;
    height: 8px;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── TOOLTIP ── */
  .v-tip {
    background: rgba(20,20,20,0.72);
    color: #f0ece4;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    white-space: nowrap;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: auto;
    cursor: pointer;
  }
  .v-tip::before { display: none; }
  .v-tip-hide { display: none !important; }

  .loc-popup { padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: #333; }

  /* ── LIST VIEW ── */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
    flex-shrink: 0;
  }

  .view-btn {
    width: 34px; height: 30px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.15s;
  }

  .view-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  #listView {
    flex: 1;
    overflow-y: auto;
    display: none;
    background: var(--bg);
  }

  .list-day-header {
    padding: 14px 16px 8px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .list-day-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .venue-card {
    margin: 0 12px 8px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .venue-card:active { border-color: var(--accent); }

  .venue-card-header {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .venue-card-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .venue-card-main { flex: 1; min-width: 0; }

  .venue-card-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .venue-card-meta {
    font-size: 0.82rem;
    color: var(--muted);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .venue-card-chevron {
    color: var(--muted);
    font-size: 0.8rem;
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.2s;
  }

  .venue-card.open .venue-card-chevron { transform: rotate(180deg); }

  .venue-card-body {
    display: none;
    padding: 0 16px 14px 40px;
    border-top: 1px solid var(--border);
  }

  .venue-card.open .venue-card-body { display: block; }

  .venue-card-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }

  .venue-card-row:last-of-type { border-bottom: none; }

  .venue-card-icon { flex-shrink: 0; width: 18px; text-align: center; color: var(--muted); }

  .venue-maps-btn {
    display: block;
    margin-top: 12px;
    padding: 11px;
    background: var(--accent);
    color: #000;
    text-align: center;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    text-decoration: none;
  }

  .list-empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div id="app">

  <div id="loading">
    <div class="spinner"></div>
    <h2>London <em>Open Mics</em></h2>
    <p>Loading venues...</p>
  </div>

  <header>
    <h1>London <em>Open Mics</em></h1>

    <div class="view-toggle">
    <button class="view-btn active" id="mapViewBtn" title="Map view">🗺</button>
    <button class="view-btn" id="listViewBtn" title="List view">☰</button>
  </div>
  <button class="hdr-btn" id="filterBtn">
      ☰
      <div class="day-badge" id="dayBadge"></div>
    </button>
  </header>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search venues...">
    <button class="search-x" id="searchX">✕</button>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div id="map"></div>
<div id="listView"></div>
<button id="locBtn" title="Go to my location" style="
  position:fixed;
  bottom:32px;
  right:16px;
  width:48px;
  height:48px;
  border-radius:50%;
  background:#fff;
  border:none;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:500;
  -webkit-tap-highlight-color:transparent;
">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="8" stroke-dasharray="2 4"/>
  </svg>
</button>
</div>

<!-- Filter drawer -->
<div class="drawer-backdrop" id="backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-close-row"><button class="drawer-close-btn" id="drawerCloseBtn">✕</button></div>
  <div class="drawer-title" style="padding: 0 20px 16px;">Filter by day</div>
  <div class="day-list" id="dayList">
    <div class="day-item active" data-day="ALL">
      <div class="day-dot" style="background:var(--accent)"></div>
      <span>All days</span>
      <span class="day-count" id="cnt-ALL"></span>
    </div>
    <div class="day-item" data-day="MONDAY">
      <div class="day-dot" style="background:var(--mon)"></div>
      <span>Monday</span>
      <span class="day-count" id="cnt-MONDAY"></span>
    </div>
    <div class="day-item" data-day="TUESDAY">
      <div class="day-dot" style="background:var(--tue)"></div>
      <span>Tuesday</span>
      <span class="day-count" id="cnt-TUESDAY"></span>
    </div>
    <div class="day-item" data-day="WEDNESDAY">
      <div class="day-dot" style="background:var(--wed)"></div>
      <span>Wednesday</span>
      <span class="day-count" id="cnt-WEDNESDAY"></span>
    </div>
    <div class="day-item" data-day="THURSDAY">
      <div class="day-dot" style="background:var(--thu)"></div>
      <span>Thursday</span>
      <span class="day-count" id="cnt-THURSDAY"></span>
    </div>
    <div class="day-item" data-day="FRIDAY">
      <div class="day-dot" style="background:var(--fri)"></div>
      <span>Friday</span>
      <span class="day-count" id="cnt-FRIDAY"></span>
    </div>
    <div class="day-item" data-day="SATURDAY">
      <div class="day-dot" style="background:var(--sat)"></div>
      <span>Saturday</span>
      <span class="day-count" id="cnt-SATURDAY"></span>
    </div>
    <div class="day-item" data-day="SUNDAY">
      <div class="day-dot" style="background:var(--sun)"></div>
      <span>Sunday</span>
      <span class="day-count" id="cnt-SUNDAY"></span>
    </div>
  </div>
</div>

<script>
var COLOURS = { MONDAY:'#e05c5c', TUESDAY:'#e07a3a', WEDNESDAY:'#d4b84a', THURSDAY:'#5aaa6e', FRIDAY:'#4a8fd4', SATURDAY:'#7b64d4', SUNDAY:'#c45aaa' };
var DAYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

var map = L.map('map', { center:[51.505,-0.12], zoom:11 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution:'&copy; OSM &copy; CartoDB', maxZoom:19 }).addTo(map);

// Spinner
var sp = document.querySelector('.spinner'), sa = 0;
var si = setInterval(function(){ sa=(sa+10)%360; sp.style.transform='rotate('+sa+'deg)'; }, 16);

var venues=[], markers=[], activeDay='ALL', filter='', locMarker=null;

// ── MARKERS ──
function icon(day) {
  return L.divIcon({ className:'', html:'<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center"><div class="m-pin" style="background:'+(COLOURS[day]||'#888')+'"></div></div>', iconSize:[40,40], iconAnchor:[20,34], popupAnchor:[0,-34] });
}

function tc(s){ return s ? s[0].toUpperCase()+s.slice(1).toLowerCase() : ''; }

function popup(v) {
  var c=COLOURS[v.day]||'#888', u='https://maps.google.com/?q='+encodeURIComponent(v.name+', '+v.location), r='';
  if(v.time)      r+='<div class="p-row"><span class="p-icon">⏰</span><span>'+v.time+'</span></div>';
  if(v.frequency) r+='<div class="p-row"><span class="p-icon">🔁</span><span>'+v.frequency+'</span></div>';
  if(v.style)     r+='<div class="p-row"><span class="p-icon">🎵</span><span>'+v.style+'</span></div>';
  if(v.equipment) r+='<div class="p-row"><span class="p-icon">🎸</span><span>'+v.equipment+'</span></div>';
  if(v.notes)     r+='<div class="p-row"><span class="p-icon">📝</span><span>'+v.notes+'</span></div>';
  if(v.contact)   r+='<div class="p-row"><span class="p-icon">📞</span><span>'+v.contact+'</span></div>';
  if(v.instagram) r+='<div class="p-row"><span class="p-icon">📷</span><span>'+v.instagram+'</span></div>';
  r+='<div class="p-row"><span class="p-icon">📍</span><span>'+v.location+'</span></div>';
  return '<div class="p-header"><div class="p-badge" style="background:'+c+'">'+tc(v.day)+'</div><div class="p-name">'+v.name+'</div></div><div class="p-body">'+r+'</div><a class="p-maps" href="'+u+'" target="_blank">Open in Google Maps &rarr;</a>';
}

function render() {
  for(var i=0;i<markers.length;i++) map.removeLayer(markers[i]);
  markers=[];
  var q=filter.toLowerCase();
  var vis=venues.filter(function(v){
    return (activeDay==='ALL'||v.day===activeDay) && (!q||v.name.toLowerCase().indexOf(q)!==-1||v.location.toLowerCase().indexOf(q)!==-1) && v.lat && v.lng;
  });
  for(var j=0;j<vis.length;j++){
    var v=vis[j];
    var m=L.marker([v.lat,v.lng],{icon:icon(v.day)})
      .bindPopup(popup(v),{maxWidth:300})
      .bindTooltip(v.name,{permanent:true,direction:'top',offset:[0,-28],opacity:1,className:'v-tip v-tip-hide'})
      .addTo(map);
    // Make tooltip open the popup when tapped
    m.on('tooltipopen', function(e) {
      var el = e.tooltip.getElement();
      if (el) {
        el.addEventListener('click', function() { m.openPopup(); });
        el.addEventListener('touchend', function(ev) { ev.preventDefault(); m.openPopup(); });
      }
    });
    markers.push(m);
  }
  updateTips();
  updateCounts();
}

// ── TOOLTIPS ──
function updateTips(){
  var show=map.getZoom()>=14;
  var tips=document.querySelectorAll('.v-tip');
  for(var i=0;i<tips.length;i++){
    if(show) tips[i].classList.remove('v-tip-hide');
    else tips[i].classList.add('v-tip-hide');
  }
}
map.on('zoomend',updateTips);

// ── COUNTS ──
function updateCounts(){
  var total=venues.filter(function(v){ return v.lat&&v.lng; }).length;
  var el=document.getElementById('cnt-ALL');
  if(el) el.textContent=total+' venues';
  DAYS.forEach(function(d){
    var n=venues.filter(function(v){ return v.day===d&&v.lat&&v.lng; }).length;
    var el2=document.getElementById('cnt-'+d);
    if(el2) el2.textContent=n+' venues';
  });
}

// ── FILTER DRAWER ──
var drawer=document.getElementById('drawer');
var backdrop=document.getElementById('backdrop');
var filterBtn=document.getElementById('filterBtn');

function openDrawer(){ drawer.classList.add('show'); backdrop.classList.add('show'); filterBtn.classList.add('on'); }
function closeDrawer(){ drawer.classList.remove('show'); backdrop.classList.remove('show'); filterBtn.classList.remove('on'); }

filterBtn.addEventListener('click',function(){ drawer.classList.contains('show')?closeDrawer():openDrawer(); });
backdrop.addEventListener('click',closeDrawer);
document.getElementById('drawerCloseBtn').addEventListener('click',closeDrawer);

document.getElementById('dayList').addEventListener('click',function(e){
  var item=e.target.closest('.day-item');
  if(!item) return;
  document.querySelectorAll('.day-item').forEach(function(el){ el.classList.remove('active'); });
  item.classList.add('active');
  activeDay=item.dataset.day;
  render();
  if(currentView==="list") renderList();
  // Update badge
  var badge=document.getElementById('dayBadge');
  var dayShorts={MONDAY:'Mo',TUESDAY:'Tu',WEDNESDAY:'We',THURSDAY:'Th',FRIDAY:'Fr',SATURDAY:'Sa',SUNDAY:'Su'};
  if(activeDay==='ALL'){ badge.style.display='none'; }
  else { badge.style.display='flex'; badge.textContent=dayShorts[activeDay]||activeDay.slice(0,2); }
  closeDrawer();
});

// ── SEARCH ──
var searchInput=document.getElementById('searchInput');
var searchX=document.getElementById('searchX');
var searchResults=document.getElementById('searchResults');

searchInput.addEventListener('input',function(){
  var q=searchInput.value.trim();
  filter=q.toLowerCase();
  searchX.style.display=q?'block':'none';
  if(q.length<2){ searchResults.style.display='none'; render(); return; }
  var matches=venues.filter(function(v){ return v.name.toLowerCase().indexOf(q.toLowerCase())!==-1||v.location.toLowerCase().indexOf(q.toLowerCase())!==-1; }).slice(0,8);
  if(!matches.length){ searchResults.style.display='none'; render(); return; }
  searchResults.innerHTML='';
  matches.forEach(function(v){
    var el=document.createElement('div');
    el.className='s-item';
    el.innerHTML='<div class="s-item-name"><div>'+v.name+'</div><div class="s-item-loc">'+v.location+'</div></div><span class="s-day-pill" style="background:'+(COLOURS[v.day]||'#888')+'">'+v.day.slice(0,3)+'</span>';
    el.addEventListener('click',function(){
      map.setView([v.lat,v.lng],15);
      searchResults.style.display='none';
      searchInput.value=v.name;
      filter='';
      render();
      for(var i=0;i<markers.length;i++){
        var ll=markers[i].getLatLng();
        if(Math.abs(ll.lat-v.lat)<0.0001&&Math.abs(ll.lng-v.lng)<0.0001){ markers[i].openPopup(); break; }
      }
    });
    searchResults.appendChild(el);
  });
  searchResults.style.display='block';
  render();
});

searchX.addEventListener('click',function(){ searchInput.value=''; filter=''; searchX.style.display='none'; searchResults.style.display='none'; render(); if(currentView==="list") renderList(); });
document.addEventListener('click',function(e){ if(!searchInput.contains(e.target)&&!searchResults.contains(e.target)) searchResults.style.display='none'; });

// ── LOCATION ──
var lastLat = null, lastLng = null;

function placeLocMarker(lat, lng, pan) {
  lastLat = lat; lastLng = lng;
  if(locMarker) map.removeLayer(locMarker);
  locMarker = L.marker([lat, lng], {
    icon: L.divIcon({className:'', html:'<div class="loc-dot"></div>', iconSize:[14,14], iconAnchor:[7,7]}),
    zIndexOffset: 1000
  }).addTo(map).bindPopup('<div class="loc-popup">📍 You are here</div>', {closeButton:false});
  if(pan) map.panTo([lat, lng]);
}

function locate(pan) {
  if(!navigator.geolocation) return;
  // If we already have a location, use it instantly then refresh in background
  if(lastLat && pan) map.panTo([lastLat, lastLng]);
  navigator.geolocation.getCurrentPosition(
    function(pos) { placeLocMarker(pos.coords.latitude, pos.coords.longitude, pan && !lastLat); },
    function() {},
    { maximumAge: 30000, timeout: 10000, enableHighAccuracy: false }
  );
}

// Watch position continuously in background for fast updates
if(navigator.geolocation) {
  navigator.geolocation.watchPosition(
    function(pos) { placeLocMarker(pos.coords.latitude, pos.coords.longitude, false); },
    function() {},
    { maximumAge: 10000, timeout: 15000, enableHighAccuracy: false }
  );
}

document.getElementById('locBtn').addEventListener('click', function() {
  if(lastLat) {
    // Already have location — pan instantly
    map.panTo([lastLat, lastLng]);
  } else {
    locate(true);
  }
});


// ── LIST VIEW ──
var currentView = 'map';
var DAYS_ORDER = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

document.getElementById('mapViewBtn').addEventListener('click', function() {
  setView('map');
});
document.getElementById('listViewBtn').addEventListener('click', function() {
  setView('list');
});

function setView(v) {
  currentView = v;
  var mapEl = document.getElementById('map');
  var listEl = document.getElementById('listView');
  var locBtn = document.getElementById('locBtn');
  var mapBtn = document.getElementById('mapViewBtn');
  var listBtn = document.getElementById('listViewBtn');
  if (v === 'map') {
    mapEl.style.display = '';
    listEl.style.display = 'none';
    locBtn.style.display = '';
    mapBtn.classList.add('active');
    listBtn.classList.remove('active');
  } else {
    mapEl.style.display = 'none';
    listEl.style.display = '';
    locBtn.style.display = 'none';
    mapBtn.classList.remove('active');
    listBtn.classList.add('active');
    renderList();
  }
}

function renderList() {
  var listEl = document.getElementById('listView');
  var q = filter.toLowerCase();
  var filtered = venues.filter(function(v) {
    var dayMatch = activeDay === 'ALL' || v.day === activeDay;
    var nameMatch = !q || v.name.toLowerCase().indexOf(q) !== -1 || v.location.toLowerCase().indexOf(q) !== -1;
    return dayMatch && nameMatch;
  });

  if (!filtered.length) {
    listEl.innerHTML = '<div class="list-empty">No venues found</div>';
    return;
  }

  // Group by day
  var byDay = {};
  DAYS_ORDER.forEach(function(d) { byDay[d] = []; });
  filtered.forEach(function(v) { if (byDay[v.day]) byDay[v.day].push(v); });

  // Sort each day by time
  DAYS_ORDER.forEach(function(d) {
    byDay[d].sort(function(a, b) { return (a.time || 'zzz').localeCompare(b.time || 'zzz'); });
  });

  var html = '';
  DAYS_ORDER.forEach(function(d) {
    if (!byDay[d].length) return;
    var colour = COLOURS[d] || '#888';
    var label = d.charAt(0) + d.slice(1).toLowerCase();
    html += '<div class="list-day-header"><div class="list-day-dot" style="background:' + colour + '"></div>' + label + '</div>';
    byDay[d].forEach(function(v) {
      var mapsUrl = 'https://maps.google.com/?q=' + encodeURIComponent(v.name + ', ' + v.location);
      var meta = '';
      if (v.time) meta += '<span>⏰ ' + v.time + '</span>';
      meta += '<span>📍 ' + v.location + '</span>';

      var bodyRows = '';
      if (v.frequency) bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">🔁</span><span>' + v.frequency + '</span></div>';
      if (v.style)     bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">🎵</span><span>' + v.style + '</span></div>';
      if (v.equipment) bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">🎸</span><span>' + v.equipment + '</span></div>';
      if (v.notes)     bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">📝</span><span>' + v.notes + '</span></div>';
      if (v.contact)   bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">📞</span><span>' + v.contact + '</span></div>';
      if (v.instagram) bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">📷</span><span>' + v.instagram + '</span></div>';
      if (v.backingTracks) bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">🎶</span><span>Backing tracks: ' + v.backingTracks + '</span></div>';
      if (v.under18s)  bodyRows += '<div class="venue-card-row"><span class="venue-card-icon">👶</span><span>' + v.under18s + '</span></div>';

      html += '<div class="venue-card" onclick="toggleCard(this)">' +
        '<div class="venue-card-header">' +
          '<div class="venue-card-dot" style="background:' + colour + '"></div>' +
          '<div class="venue-card-main">' +
            '<div class="venue-card-name">' + v.name + '</div>' +
            '<div class="venue-card-meta">' + meta + '</div>' +
          '</div>' +
          '<div class="venue-card-chevron">▼</div>' +
        '</div>' +
        '<div class="venue-card-body">' +
          bodyRows +
          '<a class="venue-maps-btn" href="' + mapsUrl + '" target="_blank" onclick="event.stopPropagation()">Open in Google Maps →</a>' +
        '</div>' +
      '</div>';
    });
  });

  listEl.innerHTML = html;
}

function toggleCard(card) {
  card.classList.toggle('open');
}

// ── LOAD ──
var xhr = new XMLHttpRequest();
xhr.open('GET', 'https://script.google.com/macros/s/AKfycbzzky7_wAt1wdRRJDGF_OHA55dyXhuxolhUtLm_RG-fuKcCYsxVNf9p3Av82eOvNn3A_A/exec?format=json');
xhr.onload = function() {
  if (xhr.status === 200) {
    try {
      venues = JSON.parse(xhr.responseText);
      render();
      document.getElementById('loading').style.display = 'none';
      clearInterval(si);
      locate(true);
    } catch(e) {
      document.getElementById('loading').innerHTML = '<h2>Error</h2><p>' + e.message + '</p>';
    }
  }
};
xhr.onerror = function() {
  document.getElementById('loading').innerHTML = '<h2>Could not load</h2><p>Network error</p>';
};
xhr.send();
</script>
